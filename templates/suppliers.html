{% extends "base.html" %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Suppliers</h1>
    <button class="btn-primary" onclick="document.getElementById('newSupplierModal').classList.remove('hidden')">+ Add Supplier</button>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Name</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Contact</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Phone</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Balance</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Actions</th>
            </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
            {% for s in suppliers %}
            <tr>
                <td class="px-6 py-4 text-sm font-medium text-gray-900">{{ s.name }}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{ s.contact_name or '—' }}</td>
                <td class="px-6 py-4 text-sm text-gray-500">{{ s.phone }}</td>
                <td class="px-6 py-4 text-sm font-mono {{ 'text-green-600' if s.balance < 0 else 'text-red-600' }}">${{ "%.2f"|format(s.balance) }}</td>
                <td class="px-6 py-4 text-sm"><a href="/suppliers/{{ s.id }}" class="text-brand-600 hover:text-brand-700 font-medium">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- New Supplier Modal -->
<div id="newSupplierModal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-2xl">
        <h2 class="text-xl font-bold mb-4">Add Supplier</h2>
        <form method="post" action="/suppliers/add">
            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2"><label class="block text-sm font-medium">Supplier Name</label><input name="name" required class="w-full border rounded-lg p-2"></div>
                <div class="col-span-2"><label class="block text-sm font-medium">Contact Name</label><input name="contact_name" class="w-full border rounded-lg p-2"></div>
                <div><label class="block text-sm font-medium">Phone</label><input name="phone" class="w-full border rounded-lg p-2"></div>
                <div><label class="block text-sm font-medium">Email</label><input name="email" type="email" class="w-full border rounded-lg p-2"></div>
                <div class="col-span-2"><label class="block text-sm font-medium">Payment Terms</label><select name="payment_terms" class="w-full border rounded-lg p-2"><option>NET30</option><option>NET15</option><option>Due on Receipt</option></select></div>
            </div>
            <div class="mt-4 flex gap-3 justify-end">
                <button type="button" onclick="document.getElementById('newSupplierModal').classList.add('hidden')" class="btn-secondary">Cancel</button>
                <button type="submit" class="btn-primary">Save Supplier</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
